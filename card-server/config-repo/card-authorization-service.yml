spring:
  datasource:
    url: jdbc:mysql://localhost:3306/card_authorization_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8

  security:
    user:
      name: card
      password: card123

  cloud:
    stream:
      bindings:
        paymentApproved-out-0:
          destination: card.payment.approved
          content-type: application/json
        paymentRejected-out-0:
          destination: card.payment.rejected
          content-type: application/json

server:
  port: 9090

bank:
  service:
    url: http://localhost:8086

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
