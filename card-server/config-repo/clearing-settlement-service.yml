spring:
  datasource:
    url: jdbc:mysql://localhost:3306/card_authorization_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    stream:
      function:
        definition: paymentApproved
      bindings:
        paymentApproved-in-0:
          destination: card.payment.approved
          group: clearing-settlement-group
          content-type: application/json

server:
  port: 9091
