spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pg_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8090

card:
  company:
    base-url: http://localhost:9090
    approve-path: /api/authorization/request
    cancel-path: /api/cards/cancel

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE